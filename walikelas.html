<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruang Wali Kelas - Laju Akademik</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    html, body { height: 100%; margin: 0; background: #0f172a; color: white; }
    .card-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    .toast { animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body class="h-full flex flex-col">
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#0f172a]">
      <i data-lucide="loader-2" class="w-10 h-10 text-purple-400 animate-spin mb-4"></i>
      <p class="text-slate-300 font-bold tracking-widest uppercase text-sm">Menyiapkan Ruangan...</p>
  </div>

  <div id="main-content" class="h-full hidden flex-col fade-in">
      <header class="card-glass mx-4 sm:mx-8 mt-4 p-4 flex justify-between items-center bg-purple-900/20 border-purple-500/30 z-10 shrink-0">
          <div class="flex items-center gap-4">
              <a href="index.html" class="p-2 bg-white/5 hover:bg-white/10 rounded-lg text-slate-300 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
              <div>
                  <h2 class="text-xl font-800 text-purple-400">Ruang Eksklusif Wali Kelas</h2>
                  <p class="text-xs text-slate-400" id="guru-name-display">Memuat...</p>
              </div>
          </div>
          <div class="px-4 py-2 bg-purple-500/20 border border-purple-500/30 rounded-lg text-sm font-800 text-purple-300">
              Kelas: <span id="label-kelas-wali">...</span>
          </div>
      </header>

      <main class="flex-1 overflow-y-auto p-4 sm:p-8 custom-scrollbar">
          <div class="max-w-7xl mx-auto space-y-8">
              
              <div class="card-glass rounded-2xl p-6 border border-purple-500/20 shadow-xl">
                  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                      <div>
                          <h4 class="font-800 text-xl flex items-center gap-2 text-indigo-300"><i data-lucide="table"></i> Leger Nilai & Rekapitulasi</h4>
                          <p class="text-sm text-slate-400 mt-1">Tahun Ajaran Aktif: <span id="label-tahun-ajaran" class="text-amber-400 font-bold">...</span></p>
                      </div>
                      <div class="flex gap-2 flex-wrap">
                          <button onclick="window.debugSinkronData()" class="px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-700 flex items-center gap-2 shadow-lg transition-all">
                              <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sinkron Data
                          </button>
                          <button onclick="window.downloadLegerExcel()" class="px-4 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-sm font-700 flex items-center gap-2 shadow-lg transition-all">
                              <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Unduh Excel
                          </button>
                      </div>
                  </div>
                  
                  <div class="overflow-x-auto border border-white/5 rounded-xl bg-slate-900/50 pb-2 custom-scrollbar">
                      <table class="w-full text-xs text-left whitespace-nowrap">
                          <thead id="leger-table-head" class="bg-slate-800/80 text-slate-300 uppercase font-800 border-b border-white/10"></thead>
                          <tbody id="leger-table-body" class="divide-y divide-white/5"></tbody>
                      </table>
                  </div>
              </div>

              <div class="card-glass rounded-2xl p-6 border border-white/10">
                  <h4 class="font-800 text-xl mb-6 flex items-center gap-2 text-amber-400"><i data-lucide="shuffle"></i> Hub Pindahan & Mutasi Siswa</h4>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div class="bg-slate-900/50 p-5 rounded-xl border border-white/5 shadow-inner">
                          <p class="text-xs font-800 text-purple-400 uppercase mb-4 tracking-wider flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4"></i> Permintaan Masuk:</p>
                          <div id="mutasi-masuk-list" class="space-y-3 text-sm text-slate-300">Memuat...</div>
                      </div>
                      <div class="bg-slate-900/50 p-5 rounded-xl border border-white/5 shadow-inner">
                          <p class="text-xs font-800 text-amber-400 uppercase mb-4 tracking-wider flex items-center gap-2"><i data-lucide="user-minus" class="w-4 h-4"></i> Mutasikan Keluar:</p>
                          <div id="mutasi-keluar-list" class="space-y-3 max-h-72 overflow-y-auto custom-scrollbar pr-2">Memuat...</div>
                      </div>
                  </div>
              </div>

          </div>
      </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
    const fbKeySatu = "AIzaSyDTEIcErwM8r";
    const fbKeyDua = "fuiaY28GHhLmQvbv8tHD_0";
    
    const firebaseConfig = {
      apiKey: fbKeySatu + fbKeyDua,
      authDomain: "zonajago.firebaseapp.com",
      databaseURL: "https://zonajago-default-rtdb.firebaseio.com",
      projectId: "zonajago",
      storageBucket: "zonajago.firebasestorage.app",
      messagingSenderId: "659235624779",
      appId: "1:659235624779:web:176d516efa566fd7ad7ace"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.allStudents = [];
    window.mapelList = []; 
    window.kelasList = {};
    window.kelasWali = "";
    window.tahunAjaranAktif = "Belum Disetup";
    
    window.safeParse = function(str) { try { return JSON.parse(str || '{}'); } catch(e) { return {}; } };

    window.showToast = function(msg, type='success') { 
        const c = document.getElementById('toast-container'); const t = document.createElement('div'); 
        t.className = `toast px-5 py-3 rounded-xl text-sm font-600 flex items-center gap-2 shadow-xl border ${type==='error'?'bg-red-900 border-red-500':'bg-emerald-900 border-emerald-500'} text-white pointer-events-auto`; 
        t.innerHTML = `<i data-lucide="${type==='error'?'alert-circle':'check-circle'}" class="w-5 h-5"></i> ${msg}`; 
        c.appendChild(t); lucide.createIcons(); setTimeout(() => t.remove(), 4000); 
    }

    window.calculateAvg = function(pDataMapel) {
        if(!pDataMapel) return 0;
        try {
            let sum = 0; let count = 0;
            if(pDataMapel.ganjil_sts) { sum += parseFloat(pDataMapel.ganjil_sts); count++; }
            if(pDataMapel.ganjil_sas) { sum += parseFloat(pDataMapel.ganjil_sas); count++; }
            if(pDataMapel.genap_sts) { sum += parseFloat(pDataMapel.genap_sts); count++; }
            if(pDataMapel.genap_sat) { sum += parseFloat(pDataMapel.genap_sat); count++; }
            return count > 0 ? Math.round((sum / count) * 100) / 100 : 0;
        } catch(e) { return 0; }
    }

    document.addEventListener('DOMContentLoaded', () => { 
        lucide.createIcons();
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    if (snap.exists()) {
                        const userData = snap.val();
                        if (userData.role === 'guru' && userData.is_wali_kelas && userData.kelas_wali) {
                            window.kelasWali = userData.kelas_wali;
                            document.getElementById('guru-name-display').innerText = userData.nama;
                            document.getElementById('label-kelas-wali').innerText = userData.kelas_wali.replace('|', ' ');
                            loadSekolahData();
                        } else { window.location.href = 'index.html'; }
                    } else { window.location.href = 'index.html'; }
                }, { onlyOnce: true });
            } else { window.location.href = 'index.html'; }
        });
    });

    function loadSekolahData() {
        onValue(ref(db, 'pengaturan_sekolah'), (snap) => {
            if(snap.exists()) {
                const data = snap.val();
                window.mapelList = data.mapel || [];
                window.kelasList = data.kelas || {};
                window.tahunAjaranAktif = data.tahun_ajaran || "Belum Disetup";
                document.getElementById('label-tahun-ajaran').innerText = window.tahunAjaranAktif;
            }
            refreshView();
        });

        onValue(ref(db, 'students'), (snap) => {
            window.allStudents = [];
            if(snap.exists()) {
                const data = snap.val();
                Object.keys(data).forEach(k => window.allStudents.push({id_firestore: k, ...data[k]}));
            }
            refreshView();
        });
    }

    function refreshView() {
        if(window.kelasWali !== "" && window.mapelList.length > 0) {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('main-content').classList.add('flex');
            renderLegerTabel();
            renderMutasiSiswa();
        }
    }

    function getAnakWali() {
        try {
            const parts = window.kelasWali.split('|');
            const wT = (parts[0] ? parts[0].trim() : "").toUpperCase();
            const wJ = (parts[1] ? parts[1].trim() : "").toUpperCase();

            return window.allStudents.filter(d => {
                const sT = (d.tingkat || "").toString().trim().toUpperCase();
                const sJ = (d.jurusan_kelas || "").toString().trim().toUpperCase();
                const isTingkatMatch = (sT === wT) || sT.includes(wT) || wT.includes(sT);
                const isJurusanMatch = (sJ === wJ) || sJ.includes(wJ) || wJ.includes(sJ);
                return isTingkatMatch && isJurusanMatch && d.status_mutasi !== 'pending_pindah';
            });
        } catch(e) { return []; }
    }

    window.debugSinkronData = function() {
        const anak = getAnakWali();
        alert(`SINKRONISASI SUKSES!\nSiswa terdeteksi: ${anak.length} Orang.\nSistem akan menggambar tabel sekarang...`);
        renderLegerTabel();
        renderMutasiSiswa();
    }

    function renderLegerTabel() {
        try {
            let anakWali = getAnakWali();
            const thead = document.getElementById('leger-table-head'); 
            const tbody = document.getElementById('leger-table-body');

            let headHtml = `<tr><th class="p-4 text-center">Rank</th><th class="p-4">Nama Siswa</th><th class="p-4">NIS</th>`;
            window.mapelList.forEach(m => { headHtml += `<th class="p-4 text-center border-l border-white/5 text-indigo-300">${m.name}</th>`; });
            headHtml += `<th class="p-4 text-center border-l border-white/5 text-amber-400">Total Nilai</th></tr>`;
            thead.innerHTML = headHtml;

            if(anakWali.length === 0) {
                tbody.innerHTML = `<tr><td colspan="20" class="p-8 text-center text-slate-500 font-600">Belum ada siswa di kelas ini.</td></tr>`;
                return;
            }

            anakWali = anakWali.map(s => {
                let p = {};
                try { 
                    p = JSON.parse(s.data_nilai || '{}'); 
                    if (typeof p !== 'object') p = {};
                } catch(e) { p = {}; }

                let totalNilai = 0;
                window.mapelList.forEach(m => { 
                    let avg = 0;
                    if(p[m.key]) avg = window.calculateAvg(p[m.key]);
                    totalNilai += avg; 
                });
                return { ...s, parsedNilai: p, totalNilai: totalNilai };
            });
            
            anakWali.sort((a, b) => b.totalNilai - a.totalNilai);

            let bodyHtml = "";
            anakWali.forEach((s, idx) => {
                let row = `<tr class="hover:bg-white/5 border-b border-white/5">
                    <td class="p-4 text-center font-900 ${idx === 0 ? 'text-amber-400 text-lg' : (idx === 1 ? 'text-slate-300' : (idx === 2 ? 'text-amber-700' : 'text-slate-500'))}">${idx + 1}</td>
                    <td class="p-4 font-800 text-white">${s.nama}</td>
                    <td class="p-4 font-mono text-slate-400">${s.nis}</td>`;
                
                window.mapelList.forEach(m => { 
                    let avg = 0;
                    if(s.parsedNilai[m.key]) avg = window.calculateAvg(s.parsedNilai[m.key]);
                    row += `<td class="p-4 text-center font-mono border-l border-white/5 font-800 ${avg>0?'text-emerald-400':'text-slate-600'}">${avg>0?avg:'-'}</td>`; 
                });
                
                row += `<td class="p-4 text-center font-mono border-l border-white/5 font-900 text-amber-400 bg-amber-500/5">${s.totalNilai > 0 ? Math.round(s.totalNilai * 100)/100 : '-'}</td></tr>`; 
                bodyHtml += row;
            });
            
            tbody.innerHTML = bodyHtml;
            lucide.createIcons();
            
        } catch(err) {
            alert("Terjadi Error saat menggambar tabel: " + err.message);
            console.error("Detail Error:", err);
        }
    }

    function renderMutasiSiswa() {
        try {
            const anakWali = getAnakWali();
            const keluarList = document.getElementById('mutasi-keluar-list');
            
            if(keluarList) {
                keluarList.innerHTML = anakWali.map(s => `
                    <div class="flex items-center justify-between p-3 bg-slate-800/80 border border-white/5 rounded-xl text-xs">
                        <div><p class="font-bold text-white">${s.nama}</p></div>
                        ${s.status_mutasi !== 'pending_pindah' ? `
                            <select onchange="if(this.value) window.ajukanMutasiSiswa('${s.id_firestore}', this.value)" class="bg-purple-600/50 hover:bg-purple-600 transition-colors text-white p-2 rounded-lg font-bold outline-none cursor-pointer text-[11px] border border-purple-500/50">
                                <option value="">Mutasikan Ke...</option>
                                ${Object.entries(window.kelasList).flatMap(([t, js]) => js.map(j => `<option value="${t}|${j}">Kelas ${t} ${j}</option>`)).join('')}
                            </select>
                        ` : `<span class="text-[10px] font-bold text-amber-400 bg-amber-500/10 px-2 py-1 rounded">Pending ACC TU...</span>`}
                    </div>
                `).join('');
                if(anakWali.length === 0) keluarList.innerHTML = '<p class="text-xs text-slate-500 p-2">Tidak ada siswa.</p>';
            }
            
            const masukList = document.getElementById('mutasi-masuk-list');
            const requestMasuk = window.allStudents.filter(d => d.status_mutasi === 'pending_pindah' && d.kelas_tujuan === window.kelasWali);
            
            if(masukList) {
                if(requestMasuk.length === 0) { 
                    masukList.innerHTML = `<p class="text-xs text-slate-500 text-center py-4 bg-slate-800/30 rounded-xl border border-white/5">Kosong. Tidak ada siswa yang pindah ke kelas Anda.</p>`; 
                } else {
                    masukList.innerHTML = requestMasuk.map(s => `
                        <div class="flex items-center justify-between p-3 bg-purple-950/30 border border-purple-500/30 rounded-xl text-xs">
                            <div><p class="font-bold text-white">${s.nama}</p><p class="text-[10px] text-purple-300">Dari: Kelas ${s.tingkat} ${s.jurusan_kelas}</p></div>
                            <div class="flex gap-2">
                                <button onclick="window.eksekusiApprovalMutasi('${s.id_firestore}', true)" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 transition-colors rounded-lg font-bold text-white text-[11px] shadow-lg">Terima</button>
                                <button onclick="window.eksekusiApprovalMutasi('${s.id_firestore}', false)" class="px-3 py-1.5 bg-red-600 hover:bg-red-500 transition-colors rounded-lg font-bold text-white text-[11px] shadow-lg">Tolak</button>
                            </div>
                        </div>
                    `).join('');
                }
            }
        } catch(e) { console.error(e); }
    }

    window.ajukanMutasiSiswa = async function(studentId, kelasTujuan) {
        if(confirm(`Ajukan pindah kelas untuk siswa ini?`)) {
            try { 
                await update(ref(db, 'students/' + studentId), { status_mutasi: 'pending_pindah', kelas_tujuan: kelasTujuan }); 
                window.showToast("Request mutasi terkirim!"); 
            } catch(e) { window.showToast("Gagal mengajukan mutasi.", "error"); }
        }
    }

    window.eksekusiApprovalMutasi = async function(studentId, isDiterima) {
        if(isDiterima) {
            const s = window.allStudents.find(d => d.id_firestore === studentId); if(!s) return;
            const [tTujuan, jTujuan] = s.kelas_tujuan.split('|');
            try { 
                await update(ref(db, 'students/' + studentId), { tingkat: tTujuan, jurusan_kelas: jTujuan, status_mutasi: 'aktif', kelas_tujuan: "" }); 
                window.showToast("Siswa sukses dipindahkan!"); 
            } catch(e) { window.showToast("Gagal menyerap siswa.", "error"); }
        } else {
            try { 
                await update(ref(db, 'students/' + studentId), { status_mutasi: 'aktif', kelas_tujuan: "" }); 
                window.showToast("Permintaan mutasi ditolak."); 
            } catch(e) { window.showToast("Gagal memproses penolakan.", "error"); }
        }
    }

    window.downloadLegerExcel = function() {
        let anakWali = getAnakWali();
        if(anakWali.length === 0) return window.showToast("Data kelas masih kosong!", "error");

        anakWali = anakWali.map(s => {
            let p = {};
            try { p = JSON.parse(s.data_nilai || '{}'); if (typeof p !== 'object') p = {}; } catch(e) { p = {}; }
            let totalNilai = 0;
            window.mapelList.forEach(m => { if(p[m.key]) totalNilai += window.calculateAvg(p[m.key]); });
            return { ...s, parsedNilai: p, totalNilai: totalNilai };
        });
        anakWali.sort((a, b) => b.totalNilai - a.totalNilai);

        const dataToExport = anakWali.map((s, i) => {
            let row = { 'Rank': i + 1, 'NIS': s.nis, 'Nama Lengkap': s.nama };
            window.mapelList.forEach(m => {
                row[m.name] = (s.parsedNilai[m.key] ? window.calculateAvg(s.parsedNilai[m.key]) : 0);
            });
            row['Total Nilai'] = Math.round(s.totalNilai * 100) / 100;
            return row;
        });

        const ws = XLSX.utils.json_to_sheet(dataToExport); 
        const wb = XLSX.utils.book_new(); 
        XLSX.utils.book_append_sheet(wb, ws, "Leger Nilai");
        
        let namaFile = `Leger_${window.kelasWali.replace('|', '_')}_${window.tahunAjaranAktif.replace(/[^a-z0-9]/gi, '_')}.xlsx`; 
        XLSX.writeFile(wb, namaFile); 
        window.showToast('Leger Excel Berhasil Didownload!', 'success');
    }

  </script>
</body>
</html>
